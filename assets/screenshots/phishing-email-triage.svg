<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-label="Phishing email triage screenshot"><rect width="1200" height="760" fill="#f8fafc"/><rect width="1200" height="70" fill="#111827"/><text x="30" y="44" font-family="Segoe UI, Arial" font-size="26" font-weight="700" fill="#fff">Phishing Email Triage - sample report</text><g font-family="Segoe UI, Arial" font-size="20" fill="#0f172a"><rect x="40" y="110" width="1120" height="120" fill="#e0f2fe" stroke="#94a3b8"/><text x="65" y="145" font-weight="700">Reported message</text><text x="65" y="180">Subject: Account access will be disabled today</text><text x="65" y="210">Sender: security-alert@example-login-alert.com</text><rect x="40" y="260" width="1120" height="120" fill="#fef3c7" stroke="#94a3b8"/><text x="65" y="295" font-weight="700">Indicators I reviewed</text><text x="65" y="330">Urgent language, mismatched link, unfamiliar sender domain.</text><text x="65" y="360">URL documented as hxxps://example-login-alert[.]com/auth</text><rect x="40" y="410" width="1120" height="120" fill="#fee2e2" stroke="#94a3b8"/><text x="65" y="445" font-weight="700">Verdict</text><text x="65" y="480">Likely phishing in this lab scenario.</text><text x="65" y="510">Severity: Medium if not clicked; High if credentials entered.</text><rect x="40" y="560" width="1120" height="120" fill="#dcfce7" stroke="#94a3b8"/><text x="65" y="595" font-weight="700">Response</text><text x="65" y="630">Quarantine message, search for other recipients, block URL.</text><text x="65" y="660">Reset password and revoke sessions if interaction occurred.</text></g></svg>